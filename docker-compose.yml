services:
  backend:
    build: ./backend
    container_name: pokemon-gacha-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/key.json:/app/key.json:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: pokemon-gacha-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
